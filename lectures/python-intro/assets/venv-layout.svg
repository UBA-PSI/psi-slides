<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" width="420" height="260" font-family="JetBrains Mono, monospace" font-size="13">
  <style>
    .node { fill: #fafaf7; stroke: #1f1f24; stroke-width: 1.2; }
    .label { fill: #1f1f24; }
    .dim { fill: #6b6b72; font-style: italic; }
    .edge { stroke: #6b6b72; stroke-width: 1; fill: none; }
    .emph { fill: #8b2e00; font-weight: 600; }
  </style>
  <rect x="8" y="10" width="404" height="240" rx="2" class="node"/>
  <text x="24" y="36" class="label">my-project/</text>
  <text x="48" y="62" class="label">scanner.py</text>
  <text x="160" y="62" class="dim">your code</text>
  <text x="48" y="86" class="label">pyproject.toml</text>
  <text x="160" y="86" class="dim">project metadata</text>
  <text x="48" y="110" class="label">.venv/</text>
  <text x="160" y="110" class="emph">the isolated environment</text>
  <text x="72" y="134" class="label">bin/python</text>
  <text x="72" y="156" class="label">bin/pip</text>
  <text x="72" y="178" class="label">lib/python3.12/site-packages/</text>
  <text x="96" y="200" class="dim">playwright, urllib3, ...</text>
  <line x1="24" y1="218" x2="396" y2="218" class="edge" stroke-dasharray="3,3"/>
  <text x="24" y="238" class="dim">source .venv/bin/activate  → `python` resolves to .venv/bin/python</text>
</svg>
